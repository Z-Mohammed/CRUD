<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة الرسوم البيانية والأيقونات -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>CRUD Professional Dashboard</title>
</head>

<body>
    <div class="crud">
        <div class="head">
            <h2>crud</h2>
            <p>PRODUCT MANAGEMENT SYSTEM</p>
        </div>

        <!-- بداية قسم الإحصائيات الجديد (Dashboard) -->
        <div class="dashboard-stats">
            <div class="stat-card">
                <i class="fas fa-box"></i>
                <div class="stat-info">
                    <span>إجمالي المنتجات</span>
                    <h3 id="stat-count">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-wallet"></i>
                <div class="stat-info">
                    <span>قيمة المخزن</span>
                    <h3 id="stat-total-value">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-star"></i>
                <div class="stat-info">
                    <span>أغلى منتج</span>
                    <h3 id="stat-expensive">-</h3>
                </div>
            </div>
        </div>
        <!-- نهاية قسم الإحصائيات -->

        <div class="main-wrapper">
            <div class="inputs">
                <input type="text" id="title" placeholder="Title">
                <div class="price">
                    <input onkeyup="getTotal()" type="number" id="price" placeholder="Price">
                    <input onkeyup="getTotal()" type="number" id="taxes" placeholder="Taxes">
                    <input onkeyup="getTotal()" type="number" id="ads" placeholder="ads">
                    <input onkeyup="getTotal()" type="number" id="discount" placeholder="Discount">
                    <small id="total"></small>
                </div>
                <input type="number" id="count" placeholder="Count">
                <input type="text" id="category" placeholder="Category">
                <button id="submit">Create</button>
            </div>

            <!-- مكان الرسم البياني -->
            <div class="chart-box">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="outputs">
            <div class="searchBlock">
                <input type="text" id="search" placeholder="search">
                <div class="btnsearch">
                    <button id="searchTitle">Search By Title</button>
                    <button id="searchCategory">Search By Category</button>
                </div>
            </div>
            <div id="deleteAll">

            </div>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>discount</th>
                        <th>total</th>
                        <th>category</th>
                        <th>Count</th>
                        <th>update</th>
                        <th>delete</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <!-- البيانات تضاف هنا بواسطة JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
